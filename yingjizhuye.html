<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="摄影作品集影集页面">
  <title>影集 - 回忆录</title>

  <!-- 关键 CSS 内联 -->
  <style>
    @font-face {
      font-family: 'FZShuTi';
      src: url('fonts/FZShuTi.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    :root{--bg-primary:#f5f5f5;--text-primary:#333;--accent:#d4a76a;--nav-bg:rgba(245,245,245,0.7)}
    [data-theme="dark"]{--bg-primary:#1a1a1a;--text-primary:#e0e0e0;--accent:#c9955a;--nav-bg:rgba(26,26,26,0.7)}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;line-height:1.5}
    body{font-family:'FZShuTi','方正舒体简体',serif;background-color:var(--bg-primary);color:var(--text-primary);overflow-x:hidden;transition:background-color .3s ease,color .3s ease}
    img{display:block;max-width:100%;height:auto}
    a{text-decoration:none;color:inherit}
    .nav{position:fixed;top:0;left:0;width:100%;height:80px;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:var(--nav-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
    .nav__brand{font-family:'SimSun','宋体',serif;font-size:24pt;color:var(--text-primary);white-space:nowrap}
    .nav__actions{display:flex;align-items:center;gap:16px}
    .nav__theme-toggle{width:48px;height:48px;border-radius:50%;border:2px solid var(--accent);background:0 0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s ease;padding:0;overflow:hidden}
    .nav__theme-toggle:hover{transform:scale(1.1)}
    .nav__theme-toggle img{width:24px;height:24px;object-fit:contain;filter:brightness(0) saturate(100%)}
    [data-theme="dark"] .nav__theme-toggle img{filter:brightness(0) saturate(100%) invert(1)}
    .gallery-page{padding:100px 40px 40px}
    .gallery-back{display:inline-flex;align-items:center;gap:8px;font-family:'FZShuTi','方正舒体简体',serif;font-size:18px;color:var(--accent);margin-bottom:40px;padding:8px 16px;border:2px solid var(--accent);border-radius:24px;transition:background .3s ease,color .3s ease;background:0 0;cursor:pointer}
    .gallery-back:hover{background:var(--accent);color:#fff}
    .gallery-page__title{font-family:'FZShuTi','方正舒体简体',serif;font-size:48px;text-align:center;margin-bottom:60px;color:var(--text-primary)}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;max-width:1400px;margin:0 auto}
    .gallery-grid__item{border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .3s ease}
    .gallery-grid__item:hover{transform:scale(1.03)}
    .gallery-grid__item img{width:100%;aspect-ratio:1227/922;object-fit:cover}
    @media(max-width:767px){.nav{padding:0 16px;height:64px}.nav__brand{font-size:18pt}.nav__theme-toggle{width:40px;height:40px}.nav__theme-toggle img{width:20px;height:20px}.gallery-page{padding:80px 16px 20px}.gallery-page__title{font-size:32px;margin-bottom:40px}.gallery-grid{grid-template-columns:1fr}}
  </style>

  <!-- 非关键 CSS 异步加载 -->
  <link rel="preload" href="css/styles.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="css/styles.css"></noscript>
</head>
<body>

  <!-- ========== 导航栏 ========== -->
  <nav class="nav" role="navigation">
    <span class="nav__brand">影集·回忆录</span>
    <div class="nav__actions">
      <button class="nav__theme-toggle" aria-label="切换深色模式">
        <img src="images/zhuti.png" alt="主题" loading="lazy">
      </button>
    </div>
  </nav>

  <!-- ========== 影集内容 ========== -->
  <main class="gallery-page">
    <button class="gallery-back" onclick="history.back()" aria-label="返回首页">
      ← 返回首页
    </button>

    <h1 class="gallery-page__title">作品影集</h1>

    <div class="gallery-grid">
      <div class="gallery-grid__item">
        <img src="images/2.jpg" alt="作品 1" loading="lazy">
      </div>
      <div class="gallery-grid__item">
        <img src="images/3.jpg" alt="作品 2" loading="lazy">
      </div>
      <div class="gallery-grid__item">
        <img src="images/4.jpg" alt="作品 3" loading="lazy">
      </div>
      <div class="gallery-grid__item">
        <img src="images/5.jpg" alt="作品 4" loading="lazy">
      </div>
    </div>
  </main>

  <!-- ========== 脚本 ========== -->
  <script>
    (function () {
      'use strict';

      // 深色模式
      const Theme = {
        STORAGE_KEY: 'portfolio-theme',

        init() {
          const saved = localStorage.getItem(this.STORAGE_KEY);
          if (saved) {
            this.apply(saved);
          } else {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            this.apply(prefersDark ? 'dark' : 'light');
          }
        },

        toggle() {
          const current = document.documentElement.getAttribute('data-theme') || 'light';
          const next = current === 'dark' ? 'light' : 'dark';
          this.apply(next);
          localStorage.setItem(this.STORAGE_KEY, next);
        },

        apply(mode) {
          if (mode === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          } else {
            document.documentElement.removeAttribute('data-theme');
          }
        }
      };

      document.addEventListener('DOMContentLoaded', function () {
        Theme.init();

        var themeToggle = document.querySelector('.nav__theme-toggle');
        if (themeToggle) {
          themeToggle.addEventListener('click', function () { Theme.toggle(); });
        }
      });
    })();
  </script>
</body>
</html>
